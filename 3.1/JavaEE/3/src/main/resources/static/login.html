<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>个人博客 - 登录</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 内联样式，仅作示例 */
        .login-form { max-width:400px; margin:20px auto; display:flex; flex-direction:column; gap:12px; }
        .login-form input { padding:6px; font-size:14px; }
        .login-form button { padding:8px; font-size:14px; cursor:pointer; }
        .error { border:1px solid red; }
    </style>
</head>
<body>
<header class="header">
    <div class="logo">my 博客</div>
    <nav class="nav">
        <a href="index.html">返回首页</a>
    </nav>
</header>

<main class="main">
    <h1>用户登录</h1>
    <form id="loginForm" class="login-form">
        <label for="username">用户名：</label>
        <input type="text" id="username" name="username">

        <label for="password">密码：</label>
        <input type="password" id="password" name="password">

        <button type="submit">登录</button>
    </form>
</main>

<footer class="footer">
    <p>&copy; 2025 我的博客</p>
</footer>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const API_ROOT = 'http://localhost:8080/api'; // 修改为你的后端地址
        const form = document.getElementById("loginForm");
        let loginAttempts = 0; // 失败次数

        if (!form) return;

        // 自动填充用户名
        const savedUser = localStorage.getItem("username");
        if (savedUser) document.getElementById("username").value = savedUser;

        function showMsg(msg) { alert(msg); }
        function clearErrors() {
            document.getElementById("username").classList.remove("error");
            document.getElementById("password").classList.remove("error");
        }

        async function doLogin(usernameVal, passwordVal) {
            try {
                const res = await fetch(API_ROOT + '/login', {
                    method: 'POST',
                    headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ username: usernameVal, password: passwordVal })
                });

                if (res.ok) {
                    const data = await res.json().catch(() => null);
                    const status = data && (data.status || 'success');
                    if (status === 'success') {
                        localStorage.setItem('username', usernameVal);
                        sessionStorage.setItem('isLoggedIn', '1');
                        return true;
                    } else return false;
                } else if (res.status === 401) {
                    return false;
                } else {
                    showMsg('登录失败，服务器返回：' + res.status);
                    return false;
                }
            } catch (err) {
                console.error(err);
                showMsg('网络错误或无法连接后端，请检查控制台。');
                return false;
            }
        }

        form.addEventListener("submit", async (event) => {
            event.preventDefault();
            clearErrors();

            const usernameEl = document.getElementById("username");
            const passwordEl = document.getElementById("password");
            const loginBtn = form.querySelector("button[type='submit']") || form.querySelector("button");

            const username = usernameEl.value.trim();
            const password = passwordEl.value.trim();
            let valid = true;
            if (!username) { showMsg("用户名不能为空！"); usernameEl.classList.add("error"); valid=false; }
            if (!password) { showMsg("密码不能为空！"); passwordEl.classList.add("error"); valid=false; }
            if (!valid) return;

            const ok = await doLogin(username, password);
            if (ok) {
                showMsg('登录成功！');
                window.location.href = 'index.html';
            } else {
                loginAttempts++;
                const remaining = Math.max(0, 3 - loginAttempts);
                showMsg("用户名或密码错误！剩余尝试次数：" + remaining);
                passwordEl.classList.add("error");
                passwordEl.value = "";
                if (loginAttempts >= 3) {
                    showMsg("错误次数过多，按钮已禁用，请稍后再试。");
                    if (loginBtn) loginBtn.disabled = true;
                }
            }
        });
    });
</script>

</body>
</html>
